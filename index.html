<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reinforcement Learning Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px;
  }

  h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 4px; letter-spacing: -0.5px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 20px; }

  .main-container {
    display: flex;
    gap: 20px;
    max-width: 1160px;
    width: 100%;
    flex-wrap: wrap;
    justify-content: center;
  }

  .left-panel { display: flex; flex-direction: column; gap: 14px; }

  .canvas-wrapper {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 16px;
    border: 1px solid #2a2a4a;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  canvas { display: block; border-radius: 8px; }

  .reward-chart-wrapper {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 12px 16px;
    border: 1px solid #2a2a4a;
  }
  .reward-chart-wrapper .chart-title {
    font-size: 12px; color: #888; margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .controls {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid #2a2a4a;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    width: 280px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .control-group { display: flex; flex-direction: column; gap: 6px; }
  .control-group label {
    font-size: 11px; font-weight: 500; color: #aaa;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .ctrl-row { display: flex; align-items: center; gap: 8px; }

  .value-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700; color: #00d4ff;
    min-width: 48px; line-height: 1;
  }

  input[type="range"] {
    -webkit-appearance: none; flex: 1;
    height: 5px; border-radius: 3px; outline: none; cursor: pointer;
  }
  .slider-blue { background: linear-gradient(90deg, #00d4ff, #0066aa); }
  .slider-green { background: linear-gradient(90deg, #00ff88, #006633); }
  .slider-orange { background: linear-gradient(90deg, #ff9f43, #cc5500); }
  .slider-purple { background: linear-gradient(90deg, #a78bfa, #5b21b6); }
  .slider-pink { background: linear-gradient(90deg, #f472b6, #9d174d); }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px; background: #fff;
    border-radius: 50%; cursor: grab;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.15); }

  .info-box {
    background: #12122a;
    border-radius: 10px;
    padding: 10px 12px;
    border: 1px solid #2a2a4a;
    font-size: 12px;
  }
  .info-row { display: flex; justify-content: space-between; padding: 3px 0; }
  .info-row .lbl { color: #888; }
  .info-row .val { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: #e0e0e0; }

  .btn-group { display: flex; gap: 6px; }
  button {
    flex: 1; padding: 9px 14px; border: none; border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: linear-gradient(135deg, #00d4ff, #0088cc); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,212,255,0.3); }
  .btn-secondary { background: #2a2a4a; color: #ccc; }
  .btn-secondary:hover { background: #3a3a5a; }

  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    flex: 1; padding: 7px; font-size: 11px; border-radius: 6px;
    background: #2a2a4a; color: #aaa; border: 1px solid transparent;
    font-family: inherit; cursor: pointer;
  }
  .view-btn.active { background: #1a3a5a; color: #00d4ff; border-color: #00d4ff; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 10px; font-size: 11px; color: #888;
    justify-content: center; margin-top: 8px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 10px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-ready { background: #2a2a2a; color: #888; }
  .badge-running { background: #1a2a3a; color: #00d4ff; }
  .badge-done { background: #0a3a2a; color: #00ff88; }

  .map-selector { display: flex; gap: 4px; }
  .map-btn {
    flex: 1; padding: 7px; font-size: 11px; border-radius: 6px;
    background: #2a2a4a; color: #aaa; border: 1px solid transparent;
    font-family: inherit; cursor: pointer;
  }
  .map-btn.active { background: #2a1a3a; color: #a78bfa; border-color: #a78bfa; }

  .range-labels {
    display: flex; justify-content: space-between;
    font-size: 10px; color: #555; margin-top: 2px;
  }
</style>
</head>
<body>

<h1>🤖 Reinforcement Learning Visualizer</h1>
<p class="subtitle">Q-Learning 에이전트가 Grid World에서 최적 경로를 학습하는 과정을 관찰하세요</p>

<div class="main-container">
  <div class="left-panel">
    <div class="canvas-wrapper">
      <canvas id="gridCanvas" width="520" height="520"></canvas>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#00d4ff;"></div>에이전트</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00ff88;"></div>목표 (+100)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff4444;"></div>함정 (-50)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#444;"></div>벽</div>
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#1a1a2e,#ff9f43);"></div>Q-value 높음</div>
    </div>
    <div class="reward-chart-wrapper">
      <div class="chart-title">에피소드별 보상 추이</div>
      <canvas id="rewardChart" width="520" height="100"></canvas>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>맵 선택</label>
      <div class="map-selector">
        <button class="map-btn active" data-map="simple">Simple</button>
        <button class="map-btn" data-map="maze">Maze</button>
        <button class="map-btn" data-map="traps">Traps</button>
      </div>
    </div>

    <div class="control-group">
      <label>보기 모드</label>
      <div class="view-toggle">
        <button class="view-btn active" data-view="qvalue">Q-Value</button>
        <button class="view-btn" data-view="policy">Policy</button>
        <button class="view-btn" data-view="visits">방문 횟수</button>
      </div>
    </div>

    <div class="control-group">
      <label>학습률 (α)</label>
      <div class="ctrl-row">
        <span class="value-display" id="lrVal" style="color:#00d4ff;">0.20</span>
        <input type="range" class="slider-blue" id="lrSlider" min="0.01" max="1.0" step="0.01" value="0.20">
      </div>
    </div>

    <div class="control-group">
      <label>할인율 (γ)</label>
      <div class="ctrl-row">
        <span class="value-display" id="gammaVal" style="color:#00ff88;">0.95</span>
        <input type="range" class="slider-green" id="gammaSlider" min="0.1" max="0.99" step="0.01" value="0.95">
      </div>
    </div>

    <div class="control-group">
      <label>탐험률 (ε)</label>
      <div class="ctrl-row">
        <span class="value-display" id="epsVal" style="color:#ff9f43;">0.30</span>
        <input type="range" class="slider-orange" id="epsSlider" min="0.01" max="1.0" step="0.01" value="0.30">
      </div>
      <div class="range-labels"><span>활용 (exploit)</span><span>탐험 (explore)</span></div>
    </div>

    <div class="control-group">
      <label>애니메이션 속도</label>
      <div class="ctrl-row">
        <span class="value-display" id="speedVal" style="color:#a78bfa;">0.15s</span>
        <input type="range" class="slider-purple" id="speedSlider" min="20" max="800" step="10" value="150">
      </div>
      <div class="range-labels"><span>빠름</span><span>느림</span></div>
    </div>

    <div class="control-group">
      <label>ε 감소 (Decay)</label>
      <div class="ctrl-row">
        <span class="value-display" id="decayVal" style="color:#f472b6;">0.995</span>
        <input type="range" class="slider-pink" id="decaySlider" min="0.9" max="1.0" step="0.001" value="0.995">
      </div>
      <div class="range-labels"><span>빠른 감소</span><span>유지</span></div>
    </div>

    <div class="info-box">
      <div class="info-row"><span class="lbl">상태</span><span class="val"><span class="badge badge-ready" id="badge">READY</span></span></div>
      <div class="info-row"><span class="lbl">에피소드</span><span class="val" id="epVal">0</span></div>
      <div class="info-row"><span class="lbl">총 스텝</span><span class="val" id="stepVal">0</span></div>
      <div class="info-row"><span class="lbl">현재 ε</span><span class="val" id="curEps">0.30</span></div>
      <div class="info-row"><span class="lbl">이번 보상</span><span class="val" id="curReward">—</span></div>
      <div class="info-row"><span class="lbl">최고 보상</span><span class="val" id="bestReward">—</span></div>
    </div>

    <div class="btn-group">
      <button class="btn-primary" id="btnRun">▶ 학습 시작</button>
      <button class="btn-secondary" id="btnStep">1 Step</button>
    </div>
    <div class="btn-group">
      <button class="btn-secondary" id="btnEpisode">1 Episode</button>
      <button class="btn-secondary" id="btnReset">↺ 초기화</button>
    </div>
  </div>
</div>

<script>
// ========== GRID WORLD SETUP ==========
const ROWS = 8, COLS = 8;
const CELL = 62, PAD = 12;
const ACTIONS = [[0,-1],[0,1],[-1,0],[1,0]]; // left, right, up, down
const ACTION_NAMES = ['←','→','↑','↓'];
const ACTION_ARROWS = ['◀','▶','▲','▼'];

const MAPS = {
  simple: {
    walls: [[1,1],[1,2],[2,1],[3,5],[3,6],[4,5],[5,3],[6,3]],
    traps: [[2,5],[5,1],[6,6]],
    start: [0,0], goal: [7,7]
  },
  maze: {
    walls: [[0,2],[1,2],[1,4],[1,5],[1,6],[2,4],[3,0],[3,1],[3,2],[3,4],[3,6],
            [4,6],[5,2],[5,3],[5,4],[5,6],[6,1],[7,3],[7,4],[7,5]],
    traps: [[2,6],[4,1],[6,5]],
    start: [0,0], goal: [7,7]
  },
  traps: {
    walls: [[1,3],[3,1],[3,3],[5,5],[5,3],[6,1]],
    traps: [[1,1],[1,5],[2,3],[3,5],[4,1],[4,7],[5,1],[6,3],[6,5],[7,1]],
    start: [0,0], goal: [7,7]
  }
};

// ========== STATE ==========
let currentMap = 'simple';
let viewMode = 'qvalue';
let alpha = 0.20, gamma = 0.95, epsilon = 0.30, epsilonInit = 0.30;
let epsDecay = 0.995;
let animSpeed = 150;
let Q = {}, visits = {};
let agentPos, episode = 0, totalSteps = 0, stepInEpisode = 0;
let episodeReward = 0, bestReward = -Infinity;
let rewardHistory = [];
let running = false, animId = null;

const cv = document.getElementById('gridCanvas');
const ctx = cv.getContext('2d');
const rcv = document.getElementById('rewardChart');
const rctx = rcv.getContext('2d');

// ========== HELPERS ==========
function key(r,c) { return r + ',' + c; }
function getMap() { return MAPS[currentMap]; }
function isWall(r,c) { return getMap().walls.some(w => w[0]===r && w[1]===c); }
function isTrap(r,c) { return getMap().traps.some(t => t[0]===r && t[1]===c); }
function isGoal(r,c) { const g = getMap().goal; return r===g[0] && c===g[1]; }
function inBounds(r,c) { return r>=0 && r<ROWS && c>=0 && c<COLS; }

function getQ(r,c,a) {
  const k = key(r,c) + ',' + a;
  if (!(k in Q)) Q[k] = 0;
  return Q[k];
}
function setQ(r,c,a,v) { Q[key(r,c)+','+a] = v; }

function maxQ(r,c) {
  let best = -Infinity;
  for (let a = 0; a < 4; a++) best = Math.max(best, getQ(r,c,a));
  return best === -Infinity ? 0 : best;
}

function bestAction(r,c) {
  let best = -Infinity, ba = 0;
  for (let a = 0; a < 4; a++) {
    const q = getQ(r,c,a);
    if (q > best) { best = q; ba = a; }
  }
  return ba;
}

function getVisits(r,c) {
  const k = key(r,c);
  return visits[k] || 0;
}

function step(r,c,a) {
  const dr = ACTIONS[a][0], dc = ACTIONS[a][1];
  let nr = r + dr, nc = c + dc;
  if (!inBounds(nr,nc) || isWall(nr,nc)) { nr = r; nc = c; }
  let reward = -1; // step penalty
  if (isGoal(nr,nc)) reward = 100;
  else if (isTrap(nr,nc)) reward = -50;
  return { nr, nc, reward };
}

function chooseAction(r,c) {
  if (Math.random() < epsilon) return Math.floor(Math.random() * 4);
  return bestAction(r,c);
}

// ========== RENDERING ==========
function cellXY(r,c) {
  return [PAD + c * CELL, PAD + r * CELL];
}

function drawGrid() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, cv.width, cv.height);

  const map = getMap();
  let maxV = 1;
  if (viewMode === 'visits') {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        maxV = Math.max(maxV, getVisits(r,c));
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const [x, y] = cellXY(r, c);
      const s = CELL - 2;

      // Background
      if (isWall(r,c)) {
        ctx.fillStyle = '#2a2a3a';
        roundRect(ctx, x+1, y+1, s, s, 6);
        ctx.fill();
        // cross pattern
        ctx.strokeStyle = '#3a3a4a';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x+8, y+8); ctx.lineTo(x+s-6, y+s-6);
        ctx.moveTo(x+s-6, y+8); ctx.lineTo(x+8, y+s-6);
        ctx.stroke();
        continue;
      }

      // Q-value or visit heatmap
      let intensity = 0;
      if (viewMode === 'qvalue') {
        const mq = maxQ(r,c);
        intensity = Math.max(0, Math.min(1, (mq + 50) / 150));
      } else if (viewMode === 'visits') {
        intensity = getVisits(r,c) / maxV;
      }

      const bg = lerpColor('#12122a', '#ff9f43', intensity * 0.6);
      ctx.fillStyle = bg;
      roundRect(ctx, x+1, y+1, s, s, 6);
      ctx.fill();

      // Border
      ctx.strokeStyle = '#2a2a4a';
      ctx.lineWidth = 0.5;
      roundRect(ctx, x+1, y+1, s, s, 6);
      ctx.stroke();

      // Trap
      if (isTrap(r,c)) {
        ctx.fillStyle = 'rgba(255,68,68,0.15)';
        roundRect(ctx, x+1, y+1, s, s, 6);
        ctx.fill();
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ff4444';
        ctx.fillText('⚡', x + s/2 + 1, y + s/2 + 7);
      }

      // Goal
      if (isGoal(r,c)) {
        ctx.fillStyle = 'rgba(0,255,136,0.15)';
        roundRect(ctx, x+1, y+1, s, s, 6);
        ctx.fill();
        ctx.font = '22px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#00ff88';
        ctx.fillText('⭐', x + s/2 + 1, y + s/2 + 7);
      }

      // Q-values text or Policy arrows
      if (viewMode === 'qvalue' && !isGoal(r,c) && !isTrap(r,c)) {
        drawQValues(x, y, s, r, c);
      } else if (viewMode === 'policy' && !isGoal(r,c) && !isTrap(r,c) && !isWall(r,c)) {
        drawPolicyArrow(x, y, s, r, c);
      } else if (viewMode === 'visits' && !isGoal(r,c) && !isTrap(r,c)) {
        const v = getVisits(r,c);
        if (v > 0) {
          ctx.font = '12px JetBrains Mono, monospace';
          ctx.textAlign = 'center';
          ctx.fillStyle = `rgba(255,255,255,${0.3 + 0.7 * (v/maxV)})`;
          ctx.fillText(v, x + s/2 + 1, y + s/2 + 5);
        }
      }
    }
  }

  // Start marker
  const [sx, sy] = cellXY(map.start[0], map.start[1]);
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#666';
  ctx.fillText('START', sx + CELL/2, sy + CELL - 8);

  // Agent
  if (agentPos) {
    const [ax, ay] = cellXY(agentPos[0], agentPos[1]);
    const cx2 = ax + CELL/2, cy2 = ay + CELL/2;

    // Glow
    const glow = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, 24);
    glow.addColorStop(0, 'rgba(0,212,255,0.35)');
    glow.addColorStop(1, 'rgba(0,212,255,0)');
    ctx.beginPath(); ctx.arc(cx2, cy2, 24, 0, Math.PI*2);
    ctx.fillStyle = glow; ctx.fill();

    // Agent body
    ctx.beginPath(); ctx.arc(cx2, cy2, 12, 0, Math.PI*2);
    ctx.fillStyle = '#00d4ff'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

    // Eyes
    ctx.fillStyle = '#0f0f1a';
    ctx.beginPath(); ctx.arc(cx2 - 4, cy2 - 2, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx2 + 4, cy2 - 2, 2.5, 0, Math.PI*2); ctx.fill();
  }
}

function drawQValues(x, y, s, r, c) {
  ctx.font = '9px JetBrains Mono, monospace';
  ctx.textAlign = 'center';

  const positions = [
    [x + 14, y + s/2 + 3],   // left
    [x + s - 12, y + s/2 + 3], // right
    [x + s/2 + 1, y + 13],     // up
    [x + s/2 + 1, y + s - 6]   // down
  ];

  const ba = bestAction(r, c);
  for (let a = 0; a < 4; a++) {
    const q = getQ(r,c,a);
    if (q === 0 && Object.keys(Q).length === 0) continue;
    const color = a === ba && q !== 0 ? '#00d4ff' : '#555';
    ctx.fillStyle = color;
    ctx.fillText(q.toFixed(0), positions[a][0], positions[a][1]);
  }
}

function drawPolicyArrow(x, y, s, r, c) {
  const mq = maxQ(r,c);
  if (mq === 0 && !Object.keys(Q).some(k => k.startsWith(key(r,c)))) return;

  const ba = bestAction(r,c);
  const cx2 = x + s/2 + 1, cy2 = y + s/2 + 1;
  const len = 14;

  const dirs = [[0,-len],[ 0,len],[-len,0],[len,0]]; // visual: left right up down
  // ACTIONS: left=[0,-1] right=[0,1] up=[-1,0] down=[1,0]
  // Arrow visual: left=[-len,0] right=[len,0] up=[0,-len] down=[0,len]
  const arrowDirs = [[-len,0],[len,0],[0,-len],[0,len]];

  const dx = arrowDirs[ba][0], dy = arrowDirs[ba][1];

  const intensity = Math.max(0.3, Math.min(1, (mq + 20) / 100));

  ctx.strokeStyle = `rgba(0,212,255,${intensity})`;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx2 - dx*0.4, cy2 - dy*0.4);
  ctx.lineTo(cx2 + dx*0.6, cy2 + dy*0.6);
  ctx.stroke();

  // Arrowhead
  const ax = cx2 + dx*0.6, ay = cy2 + dy*0.6;
  const angle = Math.atan2(dy, dx);
  ctx.fillStyle = `rgba(0,212,255,${intensity})`;
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax - 7*Math.cos(angle - 0.5), ay - 7*Math.sin(angle - 0.5));
  ctx.lineTo(ax - 7*Math.cos(angle + 0.5), ay - 7*Math.sin(angle + 0.5));
  ctx.closePath();
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function lerpColor(a, b, t) {
  const ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab = parseInt(a.slice(5,7),16);
  const br = parseInt(b.slice(1,3),16), bg2 = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
  const rr = Math.round(ar + (br-ar)*t), gg = Math.round(ag + (bg2-ag)*t), bbb = Math.round(ab + (bb-ab)*t);
  return '#' + [rr,gg,bbb].map(x => x.toString(16).padStart(2,'0')).join('');
}

// ========== REWARD CHART ==========
function drawRewardChart() {
  const w = rcv.width, h = rcv.height;
  rctx.clearRect(0, 0, w, h);

  if (rewardHistory.length < 2) {
    rctx.fillStyle = '#333';
    rctx.font = '12px Noto Sans KR, sans-serif';
    rctx.textAlign = 'center';
    rctx.fillText('학습이 시작되면 보상 그래프가 표시됩니다', w/2, h/2 + 4);
    return;
  }

  const data = rewardHistory.slice(-80);
  const minR = Math.min(...data, -60);
  const maxR = Math.max(...data, 110);
  const range = maxR - minR || 1;
  const padL = 8, padR = 8, padT = 8, padB = 8;
  const gw = w - padL - padR, gh = h - padT - padB;

  // Zero line
  const zy = padT + gh * (1 - (0 - minR) / range);
  rctx.strokeStyle = '#2a2a4a';
  rctx.lineWidth = 0.5;
  rctx.setLineDash([4,4]);
  rctx.beginPath(); rctx.moveTo(padL, zy); rctx.lineTo(w-padR, zy); rctx.stroke();
  rctx.setLineDash([]);

  // Area fill
  const grad = rctx.createLinearGradient(0, padT, 0, h - padB);
  grad.addColorStop(0, 'rgba(0,212,255,0.15)');
  grad.addColorStop(1, 'rgba(0,212,255,0)');
  rctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const px = padL + (i / (data.length - 1)) * gw;
    const py = padT + gh * (1 - (data[i] - minR) / range);
    i === 0 ? rctx.moveTo(px, py) : rctx.lineTo(px, py);
  }
  rctx.lineTo(padL + gw, h - padB);
  rctx.lineTo(padL, h - padB);
  rctx.closePath();
  rctx.fillStyle = grad;
  rctx.fill();

  // Line
  rctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const px = padL + (i / (data.length - 1)) * gw;
    const py = padT + gh * (1 - (data[i] - minR) / range);
    i === 0 ? rctx.moveTo(px, py) : rctx.lineTo(px, py);
  }
  rctx.strokeStyle = '#00d4ff';
  rctx.lineWidth = 1.5;
  rctx.stroke();

  // Last point dot
  const lx = padL + gw;
  const ly = padT + gh * (1 - (data[data.length-1] - minR) / range);
  rctx.beginPath(); rctx.arc(lx, ly, 3, 0, Math.PI*2);
  rctx.fillStyle = '#00d4ff'; rctx.fill();
}

// ========== Q-LEARNING LOGIC ==========
function initEpisode() {
  const map = getMap();
  agentPos = [...map.start];
  stepInEpisode = 0;
  episodeReward = 0;
}

function doStep() {
  if (!agentPos) initEpisode();
  const [r, c] = agentPos;
  const a = chooseAction(r, c);
  const { nr, nc, reward } = step(r, c, a);

  // Q-update
  const oldQ = getQ(r, c, a);
  const newQ = oldQ + alpha * (reward + gamma * maxQ(nr, nc) - oldQ);
  setQ(r, c, a, newQ);

  // Track visits
  const vk = key(nr, nc);
  visits[vk] = (visits[vk] || 0) + 1;

  agentPos = [nr, nc];
  episodeReward += reward;
  stepInEpisode++;
  totalSteps++;

  // Check terminal
  if (isGoal(nr, nc) || isTrap(nr, nc) || stepInEpisode >= 200) {
    rewardHistory.push(episodeReward);
    if (episodeReward > bestReward) bestReward = episodeReward;
    episode++;
    epsilon = Math.max(0.01, epsilon * epsDecay);
    initEpisode();
    return true; // episode ended
  }
  return false;
}

function runEpisode() {
  initEpisode();
  let steps = 0;
  while (steps < 200) {
    const [r, c] = agentPos;
    const a = chooseAction(r, c);
    const { nr, nc, reward } = step(r, c, a);
    const oldQ = getQ(r, c, a);
    setQ(r, c, a, oldQ + alpha * (reward + gamma * maxQ(nr, nc) - oldQ));
    const vk = key(nr, nc);
    visits[vk] = (visits[vk] || 0) + 1;
    agentPos = [nr, nc];
    episodeReward += reward;
    totalSteps++;
    steps++;
    if (isGoal(nr, nc) || isTrap(nr, nc)) break;
  }
  rewardHistory.push(episodeReward);
  if (episodeReward > bestReward) bestReward = episodeReward;
  episode++;
  epsilon = Math.max(0.01, epsilon * epsDecay);
  initEpisode();
}

// ========== ANIMATION ==========
function updateDisplay() {
  drawGrid();
  drawRewardChart();
  document.getElementById('epVal').textContent = episode;
  document.getElementById('stepVal').textContent = totalSteps;
  document.getElementById('curEps').textContent = epsilon.toFixed(3);
  document.getElementById('curReward').textContent = episodeReward.toFixed(0);
  document.getElementById('bestReward').textContent = bestReward === -Infinity ? '—' : bestReward.toFixed(0);
}

function animLoop() {
  if (!running) return;
  doStep();
  updateDisplay();
  animId = setTimeout(animLoop, animSpeed);
}

function stopAnim() {
  running = false;
  if (animId) { clearTimeout(animId); animId = null; }
  document.getElementById('btnRun').textContent = '▶ 학습 시작';
  setBadge('ready');
}

function resetAll() {
  stopAnim();
  Q = {}; visits = {};
  episode = 0; totalSteps = 0;
  epsilon = epsilonInit;
  bestReward = -Infinity;
  rewardHistory = [];
  episodeReward = 0;
  initEpisode();
  updateDisplay();
}

function setBadge(s) {
  const b = document.getElementById('badge');
  b.className = 'badge badge-' + s;
  b.textContent = {ready:'READY', running:'LEARNING', done:'DONE'}[s];
}

// ========== EVENT LISTENERS ==========
document.getElementById('lrSlider').addEventListener('input', e => {
  alpha = parseFloat(e.target.value);
  document.getElementById('lrVal').textContent = alpha.toFixed(2);
});

document.getElementById('gammaSlider').addEventListener('input', e => {
  gamma = parseFloat(e.target.value);
  document.getElementById('gammaVal').textContent = gamma.toFixed(2);
});

document.getElementById('epsSlider').addEventListener('input', e => {
  epsilon = epsilonInit = parseFloat(e.target.value);
  document.getElementById('epsVal').textContent = epsilon.toFixed(2);
});

document.getElementById('speedSlider').addEventListener('input', e => {
  animSpeed = parseInt(e.target.value);
  document.getElementById('speedVal').textContent = (animSpeed/1000).toFixed(2) + 's';
});

document.getElementById('decaySlider').addEventListener('input', e => {
  epsDecay = parseFloat(e.target.value);
  document.getElementById('decayVal').textContent = epsDecay.toFixed(3);
});

document.querySelectorAll('.view-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    viewMode = b.dataset.view;
    drawGrid();
  });
});

document.querySelectorAll('.map-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.map-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentMap = b.dataset.map;
    resetAll();
  });
});

document.getElementById('btnRun').addEventListener('click', () => {
  if (running) { stopAnim(); }
  else {
    running = true;
    setBadge('running');
    document.getElementById('btnRun').textContent = '⏸ 일시정지';
    animLoop();
  }
});

document.getElementById('btnStep').addEventListener('click', () => {
  stopAnim();
  if (!agentPos) initEpisode();
  doStep();
  updateDisplay();
});

document.getElementById('btnEpisode').addEventListener('click', () => {
  stopAnim();
  runEpisode();
  updateDisplay();
});

document.getElementById('btnReset').addEventListener('click', resetAll);

// ========== INIT ==========
initEpisode();
updateDisplay();
</script>
